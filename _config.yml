theme: jekyll-theme-cayman
title: Daily Digest
description: AI-curated daily digest of tech and research news
baseurl: "/daily-digest"
url: "https://thenicealex.github.io"

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"

